name: Zoom Bot Manual Trigger

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: 'How many hours to stay in meeting'
        required: true
        default: '4'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '6'
          - '8'

jobs:
  zoom-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: |
          npx playwright install chromium
          sudo apt-get update
          sudo apt-get install -y \
            libxshmfence1 \
            libglib2.0-0 \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libdbus-1-3 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64

      - name: Run Zoom Bot (Automated)
        env:
          STAY_HOURS: ${{ github.event.inputs.duration_hours }}
        run: node zoomBot-github.js

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zoom-bot-screenshots
          path: bot_screenshots/
          retention-days: 7
